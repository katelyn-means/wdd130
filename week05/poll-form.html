<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll-form.css">
    <title>User Poll Activity</title>
</head>

<body>
    <header>WDD 130 | HTML Form - User Poll</header>
    <main>
        <form>
            <legend>Contact Information</legend>
            <fieldset>
                <div class="form-item column2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>

            <legend>Questions</legend>
            <fieldset>
                <div class="form-item column1">
                    <label for="browser">What is your favorite browser?</label>
                    <select name="browser" id="browser">
                        <option value="1"></option>
                        <option value="2">Brave</option>
                        <option value="3">Edge</option>
                        <option value="4">Firefox</option>
                        <option value="5">Chrome</option>
                        <option value="6">Samsung</option>
                        <option value="7">Other</option>
                    </select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="form-item">
                    <label for="feedback">List the places you have lived.</label>
                    <textarea name="feedback" id="feedback" rows="4"
                      placeholder="Morgan UT, Phoenix AZ, Florence OR"></textarea>
                </div>
            </fieldset>

            <button type="submit">Submit Poll.</button>
        </form>
    </main>
    <footer>&copy;2026 | HTML Form - User Poll Activity | Katelyn Means</footer>

</body>

</html>
