<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This page provides information about several different modes for 
        how to contact the River Wranglers rafting company.">
    <meta name="author" content="Katelyn Means">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us</title>
</head>

<body>
    <header>
        <img src="images/river-wranglers-logo.jpg" alt="River Wranglers Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-header">
            <h1>River Wranglers</h1>
            <p>123 Main Street</p>
            <p>Green River, Utah</p>
            <p>+1 555 555 5555</p>
            <p>info@riverwranglers.com</p>
        </section>

        <section class="contact-grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d166908.64626405863!2d-110.18639748286512!3d38.98359831384884!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775425604514!5m2!1sen!2sus"
                  width="400" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Jack Wrangler" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="youremail@gmail.com"
                  required>

                <p>Message Purpose</p>

                <div class="radio-group">
                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </div>

                <label for="message">Message</label>
                <textarea name="message" id="message" placeholder="Type here ..."></textarea>

                <label class="checkbox">
                    <input type="checkbox" id="checkbox" name="checkbox">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/rafting-guide.jpg" alt="River Wranglers rafting guide">
                <figcaption>Rafting Guide</figcaption>
            </figure>
            <figure>
                <img src="images/safety-instructor.jpg" alt="River Wranglers safety instructor">
                <figcaption>Safety Instructor</figcaption>
            </figure>
            <figure>
                <img src="images/operations-manager.jpg" alt="River Wranglers operations manager">
                <figcaption>Operations Manager</figcaption>
            </figure>

        </section>
    </main>
    <footer>
        <p>©2026 | River Wranglers | Katelyn Means</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/"><img src="images/facebook.svg"
                  alt="Facebook icon"></a>
            <a href="https://x.com/"><img src="images/x-bw.svg" alt="X icon"></a>
            <a href="https://www.instagram.com/?hl=en"><img src="images/instagram.svg"
                  alt="Instagram icon"></a>
        </nav>
    </footer>
</body>

</html>
